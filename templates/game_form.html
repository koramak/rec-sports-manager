{% extends "base.html" %}
{% block title %}{{ "Edit game" if game else "New game" }} — RecMgr{% endblock %}
{% block content %}
<h1>{{ "Edit game" if game else "New game" }} — {{ team.name }}</h1>
<div class="card">
  <form method="post" class="stack">
    <div class="row2">
      <div>
        <label>Date *</label>
        <input type="date" name="date" required
               value="{{ game.game_dt.split(' ')[0] if game else '' }}">
      </div>
      <div>
        <label>Time *</label>
        <input type="time" name="time" required
               value="{{ game.game_dt.split(' ')[1] if game else '19:00' }}">
      </div>
    </div>
    <label>Location</label>
    <input type="text" name="location" value="{{ game.location if game else '' }}">
    <label>Opponent</label>
    <input type="text" name="opponent" value="{{ game.opponent if game else '' }}">
    <label>Notes</label>
    <textarea name="notes">{{ game.notes if game else '' }}</textarea>
    <button class="btn block" type="submit">Save game</button>
  </form>
</div>
{% if game %}
<form method="post" action="{{ url_for('game_delete', game_id=game.id) }}"
      onsubmit="return confirm('Delete this game and its RSVPs?')">
  <button class="btn danger block" type="submit">Delete game</button>
</form>
{% endif %}
{% endblock %}
