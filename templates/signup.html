{% extends "base.html" %}
{% block title %}Sign up — RecMgr{% endblock %}
{% block content %}
<div class="auth-wrap">
  <h1>Create account</h1>
  <div class="card">
    <form method="post" class="stack">
      <label style="margin-top:0;">Your name</label>
      <input type="text" name="name" required autofocus>
      <label>Email</label>
      <input type="email" name="email" required>
      <label>Phone <span class="opt">— optional</span></label>
      <input type="tel" name="phone">
      <label>Password</label>
      <input type="password" name="password" required>
      <button class="btn primary block" type="submit">Sign up</button>
    </form>
  </div>
  <p class="sub center">Already have an account? <a href="{{ url_for('login') }}" style="color:var(--ink);font-weight:700;">Log in</a></p>
</div>
{% endblock %}
