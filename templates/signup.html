{% extends "base.html" %}
{% block title %}Sign up — RecMgr{% endblock %}
{% block content %}
<div class="auth-wrap card">
  <h1>Create manager account</h1>
  <form method="post" class="stack">
    <label>Your name</label>
    <input type="text" name="name" required autofocus>
    <label>Email</label>
    <input type="email" name="email" required>
    <label>Phone (optional)</label>
    <input type="tel" name="phone">
    <label>Password</label>
    <input type="password" name="password" required>
    <button class="btn block" type="submit">Sign up</button>
  </form>
  <p class="sub center">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
</div>
{% endblock %}
